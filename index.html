<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1000">
<title>Maison Atelier</title>

<!--
  LUXURY HANDBAG STUDY INTERFACE
  ==============================

  How to use:
  - Give each participant a link with a condition in the URL, for example:
      index.html?cond=low
      index.html?cond=moderate&pid=P001
      index.html?cond=high&pid=P002
  - "pid" is an optional participant ID that gets saved in the data.
  - If the link has no condition, a setup screen appears so the
    researcher can pick one by hand (useful for testing).

  The three conditions:
  - low      = one long page (modules A to G), "View Product" appears after 7 seconds
  - moderate = 4 stages (A+B, C, D+E, F+G), button appears after 1s / 2s / 2s / 2s
  - high     = 7 stages (one module each), button appears after 1 second per stage

  All conditions end on the exact same product page (module H).

  Data that gets recorded:
  - which condition the participant was in
  - every button click and when it happened
  - how long they spent on each stage
  - whether they reached the product page
  - total time from start to finish
  When the participant clicks "Add to Bag", the data is shown on screen
  with a download button, and it is also sent to the parent window with
  postMessage (this is how you get it into Qualtrics if the page is
  embedded in an iframe).

  About the images:
  - The pictures were provided by the research team (AI-generated) and
    are embedded directly inside this file as base64 text, so the site
    still works as a single file with no separate image files.
  - Fake "Scroll to Continue" buttons that were painted inside some of
    the original pictures were cropped out, so the only clickable
    button is the real gated one that the JavaScript controls.
  - Every image spot has a label like data-img-slot="A-hero". To swap
    a picture, replace the src of the <img> in that spot.
-->

<!-- Fonts: a serif for big headings, a sans-serif for everything else -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* ============ COLORS AND FONTS USED EVERYWHERE ============ */
  :root {
    --ivory:    #F7F5F1;   /* page background */
    --ink:      #191817;   /* main text color, near-black */
    --stone:    #8A867E;   /* gray for small labels */
    --hairline: #E6E2DA;   /* very light line color for dividers */
    --gold:     #B49A5E;   /* gold accent for hardware and outlines */
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'Jost', Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-width: 1000px;      /* the study is desktop only, so keep the desktop layout */
    background: var(--ivory);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ============ TOP BAR WITH THE COLLECTION NAME ============ */
  header {
    position: sticky;         /* stays at the top when scrolling */
    top: 0;
    z-index: 10;
    background: var(--ivory);
    border-bottom: 1px solid var(--hairline);
    text-align: center;
    padding: 20px 0 16px;
    font-size: 17px;
    letter-spacing: 0.4em;    /* wide letter spacing = luxury look */
    text-transform: uppercase;
  }

  /* ============ ONE SECTION PER CONTENT MODULE (A-H) ============ */
  section {
    position: relative;
    padding: 100px 6vw;
    border-bottom: 1px solid var(--hairline);
  }


  h1, h2 {
    font-family: var(--serif);
    font-weight: 400;
    text-align: center;
  }
  h1 { font-size: 52px; }
  h2 { font-size: 36px; }

  /* small gray label above a heading */
  .eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--stone);
    text-align: center;
    margin-bottom: 16px;
  }

  /* short centered paragraph under a heading */
  .lede {
    max-width: 560px;
    margin: 24px auto 0;
    text-align: center;
  }

  /* ============ IMAGES ============ */
  /* each module shows one wide photo, centered on the page */
  .banner { max-width: 1080px; margin: 0 auto; }
  .banner img { display: block; width: 100%; height: auto; }

  /* captions aligned under the photos in a strip.
     The grid-template-columns numbers mirror where each photo sits
     inside the strip image, so every caption lines up with its photo. */
  .strip-caps {
    display: grid;
    max-width: 1080px;
    margin: 24px auto 0;   /* same distance below the photos as above them */
  }
  .cap {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.55;
    text-align: center;
    color: #33302d;
  }
  .cap .cap-title {           /* bold first line of a caption */
    display: block;
    font-size: 17px;
    margin-bottom: 6px;
  }
  .footline {                 /* small centered closing line of a section */
    max-width: 620px;
    margin: 30px auto 0;
    text-align: center;
    font-family: var(--serif);
    font-size: 15.5px;
    line-height: 1.6;
  }
  /* the size-guide strip: labels are pinned at the exact horizontal
     center of each bag in the photo (left: N%), so they stay centered
     under their bag at any window size */
  .size-strip { position: relative; padding-bottom: 60px; }
  .size-label {
    position: absolute;
    bottom: 0;
    transform: translateX(-50%);
    width: max-content;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
  }
  .size-label .dim {
    display: block;
    font-weight: 300;
    font-size: 12px;
    color: #4a4744;
    margin-top: 2px;
  }

  /* ============ BUTTONS ============ */
  .button-area {
    margin-top: 60px;
    text-align: center;
    min-height: 60px;   /* keeps space so the page does not jump when the button appears */
  }

  .cta {
    font-family: var(--sans);
    font-size: 11.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #fff;
    background: var(--ink);
    border: 1px solid var(--ink);
    padding: 16px 50px;
    cursor: pointer;
  }
  .cta:hover { background: #000; }

  /* gold-outline version, used on the setup screen */
  .cta.outline { background: transparent; color: var(--ink); border: 1px solid var(--gold); }
  .cta.outline:hover { background: var(--ink); color: #fff; }

  /* HIDDEN BUTTON TRICK:
     every stage button starts with the "hidden-btn" class, which makes
     it invisible AND unclickable. JavaScript removes the class after
     the required viewing time, and the button fades in. */
  .hidden-btn {
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s;   /* the fade-in */
  }

  /* ============ PRODUCT PAGE (MODULE H) ============ */
  .product {
    display: grid;
    grid-template-columns: 1.1fr 1fr;   /* image on the left, info on the right */
    gap: 60px;
    max-width: 1060px;
    margin: 0 auto;
    align-items: center;
  }
  .product img { display: block; width: 100%; height: auto; }
  .product h1 { text-align: left; font-size: 42px; }
  .price { margin-top: 12px; letter-spacing: 0.12em; }
  .desc  { margin-top: 24px; max-width: 420px; }

  /* the size / material / color table */
  .specs { margin-top: 28px; border-top: 1px solid var(--hairline); }
  .specs div {
    display: flex;
    justify-content: space-between;
    padding: 10px 2px;
    border-bottom: 1px solid var(--hairline);
    font-size: 12.5px;
  }
  .specs dt {
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 10.5px;
    color: var(--stone);
  }
  .product .cta { margin-top: 36px; }

  /* ============ FULL-SCREEN PANELS (setup screen + thank-you screen) ============ */
  .overlay {
    position: fixed;
    inset: 0;               /* cover the whole window */
    z-index: 100;
    background: var(--ivory);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .overlay .inner { max-width: 520px; text-align: center; }
  .overlay .buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
  .overlay pre {
    margin-top: 24px;
    text-align: left;
    font-size: 11px;
    background: #fff;
    border: 1px solid var(--hairline);
    padding: 14px;
    max-height: 220px;
    overflow: auto;
    white-space: pre-wrap;
  }
  .hidden { display: none; }

  /* ============ QUESTIONNAIRE ============ */
  .q-wrap { max-width: 760px; margin: 0 auto; padding: 70px 20px 90px; }
  .q-progress { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
                color: var(--stone); text-align: center; margin-bottom: 26px; }
  .q-instruction { text-align: center; max-width: 620px; margin: 0 auto 34px; color: #3c3a37; }
  .q-item { border: none; margin: 0 0 34px; padding: 0; }
  .q-item legend, .q-item .q-text { font-size: 15px; margin-bottom: 12px; color: var(--ink); }
  .q-item.q-missing legend, .q-item.q-missing .q-text { color: #8a2a2a; }
  .likert { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: nowrap; }
  .likert .anchor { font-size: 11px; color: var(--stone); width: 110px; }
  .likert .anchor.right { text-align: left; } .likert .anchor.left { text-align: right; }
  .opt { display: inline-flex; flex-direction: column; align-items: center; gap: 3px;
         padding: 4px 7px; cursor: pointer; font-size: 12px; color: #55524e; }
  .optline { display: block; margin: 6px 0; cursor: pointer; font-size: 14.5px; }
  .optline input { margin-right: 9px; }
  .q-num { font-family: var(--sans); font-size: 15px; padding: 9px 12px;
           border: 1px solid #c9c4bb; background: #fff; width: 190px; }
  .q-error { display: none; color: #8a2a2a; text-align: center; margin: 18px 0; font-size: 14px; }
  .q-nav { text-align: center; margin-top: 44px; }
  .center-screen { min-height: 55vh; display: flex; align-items: center;
                   justify-content: center; text-align: center; padding: 40px; }
</style>
</head>
<body>

/* ==================================================================
   PART 2: THE CONTENT MODULES (A to H)
   Each module is a function that returns the HTML for one section.
   The same modules are used in every condition - only how they are
   split into stages changes.
   ================================================================== */

// Most pictures already contain their own titles and captions,
// so each module is simply: the module tag + the picture.
function pictureModule(letter, slotName, altText) {
  return '<section data-module="' + letter + '">' +
    '<div class="banner" data-img-slot="' + slotName + '">' +
      '<img src="' + IMAGES[letter] + '" alt="' + altText + '">' +
    '</div>' +
  '</section>';
}

function moduleA() { return pictureModule('A', 'A-hero',   'The handbag in black'); }
function moduleC() { return pictureModule('C', 'C-onbody', 'Models carrying the handbag'); }
function moduleG() { return pictureModule('G', 'G-colors', 'Color palette'); }

// Module B is pure text (selectable, like a real site) - no picture.
function moduleB() {
  return '<section data-module="B">' +
    '<p class="eyebrow">The Collection</p>' +
    '<h1>The \u00c9lan</h1>' +
    '<p class="lede">A study in quiet luxury, the \u00c9lan handbag is defined by ' +
    'sculpted lines, impeccable craftsmanship, and a timeless silhouette. ' +
    'Designed to elevate every moment, it embodies modern sophistication ' +
    'with enduring grace.</p>' +
  '</section>';
}

// Module D: real-text heading and captions, photos as one strip image.
function moduleD() {
  return '<section data-module="D" style="background:#f5f1ee">' +
    '<h2>Crafted Details</h2>' +
    '<div class="banner" data-img-slot="D-crafted" style="margin-top:24px">' +
      '<img src="' + IMAGES.D + '" alt="Close-ups of the hardware, clasp and interior">' +
    '</div>' +
    '<div class="strip-caps" style="grid-template-columns:179fr 298fr 13fr 300fr 10fr 308fr 162fr">' +
      '<p class="cap" style="grid-column:2">Polished gold-tone rings and refined hardware create a distinctive finish.</p>' +
      '<p class="cap" style="grid-column:4">A sculpted signature clasp adds a bold, sophisticated accent.</p>' +
      '<p class="cap" style="grid-column:6">A versatile interior flap reveals thoughtful design and timeless elegance.</p>' +
    '</div>' +
    '<p class="footline">Meticulous craftsmanship and elevated materials come together in a silhouette defined by quiet luxury and modern refinement.</p>' +
  '</section>';
}

// Module E: same idea - text in HTML, photos as one strip image.
function moduleE() {
  return '<section data-module="E" style="background:#f5f0ec">' +
    '<h2>Materials</h2>' +
    '<div class="banner" data-img-slot="E-materials" style="margin-top:24px">' +
      '<img src="' + IMAGES.E + '" alt="Leather texture and construction close-ups">' +
    '</div>' +
    '<div class="strip-caps" style="grid-template-columns:221fr 407fr 58fr 363fr 218fr">' +
      '<p class="cap" style="grid-column:2"><span class="cap-title">Premium Cowhide Leather</span>Soft full-grain cowhide with a rich natural texture, selected for durability, structure, and a refined hand feel.</p>' +
      '<p class="cap" style="grid-column:4"><span class="cap-title">Refined Construction</span>Carefully finished details, polished hardware, and a structured silhouette highlight the elegance of elevated craftsmanship.</p>' +
    '</div>' +
    '<p class="footline">Crafted from high-quality cowhide leather, each piece balances supple texture with lasting strength for timeless everyday luxury.</p>' +
  '</section>';
}

// Module F: size guide - the five bags are one strip image, the
// heading and every size label are real text. Each label sits at the
// exact center of its bag (the left percentages were measured from
// the photo).
function moduleF() {
  return '<section data-module="F" style="background:#f7efed">' +
    '<h2>Size Guide</h2>' +
    '<p class="lede">One silhouette, five sizes. Choose the perfect proportion to complement your day, from essentials to everything.</p>' +
    '<div class="banner size-strip" data-img-slot="F-sizes" style="margin-top:24px">' +

function api(payload, onOk, onFail) {
  payload.responseId = S.responseId;
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function (r) { return r.json(); })
    .then(function (res) {
      if (res && res.ok) onOk(res);
      else onFail(res && res.error ? res.error : 'server error');
    })
    .catch(function (err) { onFail(String(err)); });
}

/* ==================================================================
   PART 7: BROWSING TELEMETRY (clicks, stage times, module dwell)
   ================================================================== */

var telemetry = { clicks: [], stageTimes: [], moduleViews: {} };
var startTime = null;
var stageStartTime = null;

function recordClick(label) {
  telemetry.clicks.push({ label: label, msSinceStart: Date.now() - startTime });
}

var moduleObserver = null;
var watchedSections = [];

function watchModules() {
  stopWatchingModules();
  watchedSections = [];
  var sections = document.querySelectorAll('section[data-module]');
  for (var i = 0; i < sections.length; i++) {
    watchedSections.push({ el: sections[i],
                           module: sections[i].getAttribute('data-module'),
                           visibleSince: null });
  }
  moduleObserver = new IntersectionObserver(function (entries) {
    for (var i = 0; i < entries.length; i++) {
      var entry = entries[i];
      for (var k = 0; k < watchedSections.length; k++) {
        var w = watchedSections[k];
        if (w.el !== entry.target) continue;
        var rec = telemetry.moduleViews[w.module];
        if (!rec) rec = telemetry.moduleViews[w.module] = { firstSeenMs: null, visibleMs: 0 };
        if (entry.isIntersecting) {
          w.visibleSince = Date.now();
          if (rec.firstSeenMs === null) rec.firstSeenMs = Date.now() - startTime;
        } else if (w.visibleSince !== null) {
          rec.visibleMs += Date.now() - w.visibleSince;
          w.visibleSince = null;
        }
      }
    }
  }, { threshold: 0.33 });
  for (var j = 0; j < watchedSections.length; j++) moduleObserver.observe(watchedSections[j].el);
}

function stopWatchingModules() {
  for (var i = 0; i < watchedSections.length; i++) {
    var w = watchedSections[i];
    if (w.visibleSince !== null) {
      telemetry.moduleViews[w.module].visibleMs += Date.now() - w.visibleSince;
      w.visibleSince = null;
    }
  }
  if (moduleObserver) { moduleObserver.disconnect(); moduleObserver = null; }
}

// turn the telemetry into a simple list of events for the EVENTS sheet
function buildEvents() {
  var ev = [];
  var i;
  for (i = 0; i < telemetry.clicks.length; i++) {
    ev.push({ type: 'click', label: telemetry.clicks[i].label,
              timeMs: telemetry.clicks[i].msSinceStart });
  }
  for (i = 0; i < telemetry.stageTimes.length; i++) {
    var s = telemetry.stageTimes[i];
    ev.push({ type: 'stage', stage: s.stage, label: s.modules, dwellMs: s.msOnStage });
  }
  for (var m in telemetry.moduleViews) {
    var r = telemetry.moduleViews[m];
    ev.push({ type: 'module', label: m, timeMs: r.firstSeenMs, dwellMs: r.visibleMs });
  }
  return ev;
}

function showStage(i) {
  var stages = CONDITIONS[IV_TO_COND[S.iv]];
  var stage = stages[i];
  var isLastStage = (i === stages.length - 1);
  stageStartTime = Date.now();

  var html = '';
  for (var k = 0; k < stage.modules.length; k++) html += MODULES[stage.modules[k]]();
  html += '<div class="button-area">' +
            '<button class="cta hidden-btn" id="stageBtn">' + stage.label + '</button>' +
          '</div>';
  app.innerHTML = html;
  window.scrollTo(0, 0);
  watchModules();

  var button = document.getElementById('stageBtn');
  setTimeout(function () { button.classList.remove('hidden-btn'); }, stage.wait);

  button.onclick = function () {
    if (button.classList.contains('hidden-btn')) return;
    stopWatchingModules();
    recordClick(stage.label + ' (stage ' + (i + 1) + ' of ' + stages.length + ')');
    telemetry.stageTimes.push({ stage: i + 1, modules: stage.modules.join('+'),
                                msOnStage: Date.now() - stageStartTime });
    if (isLastStage) showProductPage();
    else showStage(i + 1);
  };
}

function showProductPage() {
  app.innerHTML = moduleH();
  window.scrollTo(0, 0);

    S.browsingDone = true;
    S.browseEndISO = new Date().toISOString();

function startQuestionnaire() {

function renderItem(it) {
  var saved = S.answers[it.id];
  var html = '<fieldset class="q-item" id="f_' + it.id + '">';
  html += '<legend>' + it.text + '</legend>';
  if (it.type === 'likert') {
    html += '<div class="likert">';
    html += '<span class="anchor left">' + (it.anchors[0] ? '1 = ' + it.anchors[0] : '') + '</span>';
    for (var v = 1; v <= 7; v++) {
      html += '<label class="opt"><input type="radio" name="' + it.id + '" value="' + v + '"' +
              (saved === v ? ' checked' : '') + '><span>' + v + '</span></label>';
    }
    html += '<span class="anchor right">' + (it.anchors[1] ? '7 = ' + it.anchors[1] : '') + '</span>';
    html += '</div>';
  } else if (it.type === 'select') {
    for (var o = 0; o < it.options.length; o++) {
      html += '<label class="optline"><input type="radio" name="' + it.id + '" value="' + it.options[o][0] + '"' +
              (saved === it.options[o][0] ? ' checked' : '') + '>' + it.options[o][1] + '</label>';
    }
  } else if (it.type === 'number') {
    html += '<input class="q-num" type="number" name="' + it.id + '" min="' + it.min + '" max="' + it.max +
            '" step="' + it.step + '"' + (saved != null ? ' value="' + saved + '"' : '') + '>';
  }
  html += '</fieldset>';
  return html;
}

function renderQPage(p) {
  var page = QPAGES[p - 1];
  var html = '<div class="q-wrap">';
  html += '<p class="q-progress">Page ' + p + ' of ' + QPAGES.length + '</p>';
  if (page.instruction) html += '<p class="q-instruction">' + page.instruction + '</p>';
  for (var i = 0; i < page.items.length; i++) html += renderItem(page.items[i]);
  html += '<p class="q-error" id="qError"></p>';
  html += '<div class="q-nav"><button class="cta" id="qNext">' +
          (p === QPAGES.length ? 'Submit' : 'Continue') + '</button></div>';
  html += '</div>';
  app.innerHTML = html;
  window.scrollTo(0, 0);

  // save every answer the moment it is given
  app.onchange = function (e) {
    var t = e.target;
    if (!t || !t.name) return;
    if (t.type === 'radio') S.answers[t.name] = Number(t.value);
    if (t.type === 'number') S.answers[t.name] = (t.value === '' ? null : Number(t.value));
    saveS();
  };

  document.getElementById('qNext').onclick = function () {
    var missing = validatePage(page);
    if (missing) {
      var err = document.getElementById('qError');
      err.textContent = missing.message;
      err.style.display = 'block';
      var f = document.getElementById('f_' + missing.id);
      f.classList.add('q-missing');
      f.scrollIntoView({ block: 'center' });
      return;
    }
    if (p === QPAGES.length) submitAll(this);
    else { S.qpage = p + 1; saveS(); renderQPage(S.qpage); }
  };
}

function validatePage(page) {
  for (var i = 0; i < page.items.length; i++) {
    var it = page.items[i];
    var v = S.answers[it.id];
    if (v == null || isNaN(v)) {
      return { id: it.id, message: 'Please answer all questions on this page before continuing.' };
    }
    if (it.type === 'number' && (v < it.min || v > it.max)) {
      return { id: it.id, message: 'Please enter a number between ' + it.min + ' and ' + it.max + '.' };
    }
    if (it.id === 'AGE' && v !== Math.round(v)) {
      return { id: it.id, message: 'Please enter your age as a whole number.' };
    }
  }
  return null;
}

};
var isPreview = params.get('preview') === '1';
var previewCond = (params.get('cond') || '').toLowerCase();
var isTest = params.get('test') === '1';   // researcher test mode: fresh random draw on EVERY open

if (isTest) {
  // behave like a brand-new participant every single time the page opens
  S = {};
  try { sessionStorage.removeItem('capucines'); } catch (e) {}
  var t = 'T' + Date.now().toString(36).toUpperCase() + Math.floor(Math.random() * 1000);
  // every value must be unique per open, otherwise the backend's
  // duplicate-protection returns the first test draw forever
  urlIds = { prolificPid: t, studyId: 'TEST', sessionId: t, qid: '' };
}

function boot() {
  // if this tab holds a session for a DIFFERENT participant id (or a
  // different preview condition), drop it and start fresh - this mainly
  // matters when testing several links in the same tab
  var differentPerson = S.ids && urlIds.sessionId && S.ids.sessionId !== urlIds.sessionId;
  var differentPreview = isPreview && S.iv && COND_TO_IV[previewCond] &&
                         S.iv !== COND_TO_IV[previewCond];
  if (differentPerson || differentPreview) {
    S = {};
    try { sessionStorage.removeItem('capucines'); } catch (e) {}
  }

  if (S.submitted) { showCompletion(); return; }

  if (!S.responseId) {
    S.responseId = (isPreview ? 'PREVIEW_' : 'R_') +
      Date.now().toString(36).toUpperCase() +
      Math.random().toString(36).slice(2, 8).toUpperCase();
    S.ids = urlIds;
    saveS();
  }

  if (S.iv) {                                   // returning within the session
    if (S.browsingDone) startQuestionnaire();
    else beginBrowsing();
    return;
  }

  if (isPreview) {                              // researcher preview
    if (!COND_TO_IV[previewCond]) {
      showCenter('Preview', 'Add cond=low, cond=moderate, or cond=high to the preview link.');
      return;
    }
  } else if (!urlIds.sessionId && !urlIds.prolificPid) {
    // participants must arrive through their personal link
    showCenter('Welcome', 'This study must be opened through your participant link. Please use the link you were given.');
    return;
  }

  showCenter('One moment\u2026', 'The study is loading.');
  api({ action: 'assign',
        prolificPid: S.ids.prolificPid, studyId: S.ids.studyId,
        sessionId: S.ids.sessionId, qid: S.ids.qid,
        preview: isPreview, previewIv: COND_TO_IV[previewCond] || 0,
        schemaVersion: SCHEMA_VERSION, questionnaireVersion: QUESTIONNAIRE_VERSION },
    function (res) {
      S.responseId = res.responseId;            // adopt the existing record if re-entering
      S.iv = res.iv;
      saveS();
      beginBrowsing();
    },
    function (err) {
      showError();
      console.log('assign failed: ' + err);
    });
}

boot();

</script>
</body>
</html>
