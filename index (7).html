<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maison Atelier</title>

<!--
  LUXURY HANDBAG STUDY INTERFACE
  ==============================

  How to use:
  - Give each participant a link with a condition in the URL, for example:
      index.html?cond=low
      index.html?cond=moderate&pid=P001
      index.html?cond=high&pid=P002
  - "pid" is an optional participant ID that gets saved in the data.
  - If the link has no condition, a setup screen appears so the
    researcher can pick one by hand (useful for testing).

  The three conditions:
  - low      = one long page (modules A to G), "View Product" appears after 7 seconds
  - moderate = 4 stages (A+B, C, D+E, F+G), button appears after 1s / 2s / 2s / 2s
  - high     = 7 stages (one module each), button appears after 1 second per stage

  All conditions end on the exact same product page (module H).

  Data that gets recorded:
  - which condition the participant was in
  - every button click and when it happened
  - how long they spent on each stage
  - whether they reached the product page
  - total time from start to finish
  When the participant clicks "Add to Bag", the data is shown on screen
  with a download button, and it is also sent to the parent window with
  postMessage (this is how you get it into Qualtrics if the page is
  embedded in an iframe).

  About the images:
  - The pictures were provided by the research team (AI-generated) and
    are embedded directly inside this file as base64 text, so the site
    still works as a single file with no separate image files.
  - Fake "Scroll to Continue" buttons that were painted inside some of
    the original pictures were cropped out, so the only clickable
    button is the real gated one that the JavaScript controls.
  - Every image spot has a label like data-img-slot="A-hero". To swap
    a picture, replace the src of the <img> in that spot.
-->

<!-- Fonts: a serif for big headings, a sans-serif for everything else -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* ============ COLORS AND FONTS USED EVERYWHERE ============ */
  :root {
    --ivory:    #F7F5F1;   /* page background */
    --ink:      #191817;   /* main text color, near-black */
    --stone:    #8A867E;   /* gray for small labels */
    --hairline: #E6E2DA;   /* very light line color for dividers */
    --gold:     #B49A5E;   /* gold accent for hardware and outlines */
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'Jost', Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-width: 1000px;      /* the study is desktop only, so keep the desktop layout */
    background: var(--ivory);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ============ TOP BAR WITH THE COLLECTION NAME ============ */
  header {
    position: sticky;         /* stays at the top when scrolling */
    top: 0;
    z-index: 10;
    background: var(--ivory);
    border-bottom: 1px solid var(--hairline);
    text-align: center;
    padding: 20px 0 16px;
    font-size: 17px;
    letter-spacing: 0.4em;    /* wide letter spacing = luxury look */
    text-transform: uppercase;
  }

  /* ============ ONE SECTION PER CONTENT MODULE (A-H) ============ */
  section {
    position: relative;
    padding: 100px 6vw;
    border-bottom: 1px solid var(--hairline);
  }

  /* the small "Module A" tag in the corner of each section */
  .module-tag {
    position: absolute;
    top: 24px;
    left: 24px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 4px 12px;
    background: #fff;
  }

  h1, h2 {
    font-family: var(--serif);
    font-weight: 400;
    text-align: center;
  }
  h1 { font-size: 52px; }
  h2 { font-size: 36px; }

  /* small gray label above a heading */
  .eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--stone);
    text-align: center;
    margin-bottom: 16px;
  }

  /* short centered paragraph under a heading */
  .lede {
    max-width: 560px;
    margin: 24px auto 0;
    text-align: center;
  }

  /* ============ IMAGES ============ */
  /* each module shows one wide photo, centered on the page */
  .banner { max-width: 1080px; margin: 0 auto; }
  .banner img { display: block; width: 100%; height: auto; }

  /* captions aligned under the photos in a strip.
     The grid-template-columns numbers mirror where each photo sits
     inside the strip image, so every caption lines up with its photo. */
  .strip-caps {
    display: grid;
    max-width: 1080px;
    margin: 16px auto 0;
  }
  .cap {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.55;
    text-align: center;
    color: #33302d;
  }
  .cap .cap-title {           /* bold first line of a caption */
    display: block;
    font-size: 17px;
    margin-bottom: 6px;
  }
  .footline {                 /* small centered closing line of a section */
    max-width: 620px;
    margin: 36px auto 0;
    text-align: center;
    font-family: var(--serif);
    font-size: 15.5px;
    line-height: 1.6;
  }
  /* the size-guide strip: labels are pinned at the exact horizontal
     center of each bag in the photo (left: N%), so they stay centered
     under their bag at any window size */
  .size-strip { position: relative; padding-bottom: 66px; }
  .size-label {
    position: absolute;
    bottom: 8px;
    transform: translateX(-50%);
    width: max-content;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
  }
  .size-label .dim {
    display: block;
    font-weight: 300;
    font-size: 12px;
    color: #4a4744;
    margin-top: 2px;
  }

  /* ============ BUTTONS ============ */
  .button-area {
    margin-top: 60px;
    text-align: center;
    min-height: 60px;   /* keeps space so the page does not jump when the button appears */
  }

  .cta {
    font-family: var(--sans);
    font-size: 11.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #fff;
    background: var(--ink);
    border: 1px solid var(--ink);
    padding: 16px 50px;
    cursor: pointer;
  }
  .cta:hover { background: #000; }

  /* gold-outline version, used on the setup screen */
  .cta.outline { background: transparent; color: var(--ink); border: 1px solid var(--gold); }
  .cta.outline:hover { background: var(--ink); color: #fff; }

  /* HIDDEN BUTTON TRICK:
     every stage button starts with the "hidden-btn" class, which makes
     it invisible AND unclickable. JavaScript removes the class after
     the required viewing time, and the button fades in. */
  .hidden-btn {
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s;   /* the fade-in */
  }

  /* ============ PRODUCT PAGE (MODULE H) ============ */
  .product {
    display: grid;
    grid-template-columns: 1.1fr 1fr;   /* image on the left, info on the right */
    gap: 60px;
    max-width: 1060px;
    margin: 0 auto;
    align-items: center;
  }
  .product img { display: block; width: 100%; height: auto; }
  .product h1 { text-align: left; font-size: 42px; }
  .price { margin-top: 12px; letter-spacing: 0.12em; }
  .desc  { margin-top: 24px; max-width: 420px; }

  /* the size / material / color table */
  .specs { margin-top: 28px; border-top: 1px solid var(--hairline); }
  .specs div {
    display: flex;
    justify-content: space-between;
    padding: 10px 2px;
    border-bottom: 1px solid var(--hairline);
    font-size: 12.5px;
  }
  .specs dt {
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 10.5px;
    color: var(--stone);
  }
  .product .cta { margin-top: 36px; }

  /* ============ FULL-SCREEN PANELS (setup screen + thank-you screen) ============ */
  .overlay {
    position: fixed;
    inset: 0;               /* cover the whole window */
    z-index: 100;
    background: var(--ivory);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .overlay .inner { max-width: 520px; text-align: center; }
  .overlay .buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
  .overlay pre {
    margin-top: 24px;
    text-align: left;
    font-size: 11px;
    background: #fff;
    border: 1px solid var(--hairline);
    padding: 14px;
    max-height: 220px;
    overflow: auto;
    white-space: pre-wrap;
  }
  .hidden { display: none; }
</style>
</head>
<body>

<header>Maison Atelier</header>

<!-- JavaScript puts the current stage's content inside this div -->
<main id="app"></main>

<!-- Setup screen, only shown when the URL has no ?cond= parameter -->
<div class="overlay hidden" id="setupScreen">
  <div class="inner">
    <p class="eyebrow">Preview mode</p>
    <h2>Choose a condition</h2>
    <p class="lede">Participant links assign this automatically (e.g. <em>?cond=low&amp;pid=P001</em>).</p>
    <div class="buttons">
      <button class="cta outline" data-cond="low">Low</button>
      <button class="cta outline" data-cond="moderate">Moderate</button>
      <button class="cta outline" data-cond="high">High</button>
      <button class="cta" data-cond="random">Random</button>
    </div>
  </div>
</div>

<!-- Thank-you screen, shown after the participant clicks "Add to Bag" -->
<div class="overlay hidden" id="endScreen">
  <div class="inner">
    <h2>Thank you</h2>
    <p class="lede">Your response has been recorded. You can now return to the survey.</p>
    <pre id="dataBox"></pre>
    <div class="buttons">
      <button class="cta outline" id="downloadBtn">Download data (JSON)</button>
    </div>
  </div>
</div>

/* ==================================================================
   PART 2: THE CONTENT MODULES (A to H)
   Each module is a function that returns the HTML for one section.
   The same modules are used in every condition - only how they are
   split into stages changes.
   ================================================================== */

// Most pictures already contain their own titles and captions,
// so each module is simply: the module tag + the picture.
function pictureModule(letter, slotName, altText) {
  return '<section>' +
    '<span class="module-tag">Module ' + letter + '</span>' +
    '<div class="banner" data-img-slot="' + slotName + '">' +
      '<img src="' + IMAGES[letter] + '" alt="' + altText + '">' +
    '</div>' +
  '</section>';
}

function moduleA() { return pictureModule('A', 'A-hero',   'The handbag in black'); }
function moduleC() { return pictureModule('C', 'C-onbody', 'Models carrying the handbag'); }
function moduleG() { return pictureModule('G', 'G-colors', 'Color palette'); }

// Module B is pure text (selectable, like a real site) - no picture.
function moduleB() {
  return '<section>' +
    '<span class="module-tag">Module B</span>' +
    '<p class="eyebrow">The Collection</p>' +
    '<h1>The \u00c9lan</h1>' +
    '<p class="lede">A study in quiet luxury, the \u00c9lan handbag is defined by ' +
    'sculpted lines, impeccable craftsmanship, and a timeless silhouette. ' +
    'Designed to elevate every moment, it embodies modern sophistication ' +
    'with enduring grace.</p>' +
  '</section>';
}

// Module D: real-text heading and captions, photos as one strip image.
function moduleD() {
  return '<section style="background:#f5f1ee">' +
    '<span class="module-tag">Module D</span>' +
    '<h2>Crafted Details</h2>' +
    '<div class="banner" data-img-slot="D-crafted" style="margin-top:26px">' +
      '<img src="' + IMAGES.D + '" alt="Close-ups of the hardware, clasp and interior">' +
    '</div>' +
    '<div class="strip-caps" style="grid-template-columns:179fr 298fr 13fr 300fr 10fr 308fr 162fr">' +
      '<p class="cap" style="grid-column:2">Polished gold-tone rings and refined hardware create a distinctive finish.</p>' +
      '<p class="cap" style="grid-column:4">A sculpted signature clasp adds a bold, sophisticated accent.</p>' +
      '<p class="cap" style="grid-column:6">A versatile interior flap reveals thoughtful design and timeless elegance.</p>' +
    '</div>' +
    '<p class="footline">Meticulous craftsmanship and elevated materials come together in a silhouette defined by quiet luxury and modern refinement.</p>' +
  '</section>';
}

// Module E: same idea - text in HTML, photos as one strip image.
function moduleE() {
  return '<section style="background:#f5f0ec">' +
    '<span class="module-tag">Module E</span>' +
    '<h2>Materials</h2>' +
    '<div class="banner" data-img-slot="E-materials" style="margin-top:26px">' +
      '<img src="' + IMAGES.E + '" alt="Leather texture and construction close-ups">' +
    '</div>' +
    '<div class="strip-caps" style="grid-template-columns:221fr 407fr 58fr 363fr 218fr">' +
      '<p class="cap" style="grid-column:2"><span class="cap-title">Premium Cowhide Leather</span>Soft full-grain cowhide with a rich natural texture, selected for durability, structure, and a refined hand feel.</p>' +
      '<p class="cap" style="grid-column:4"><span class="cap-title">Refined Construction</span>Carefully finished details, polished hardware, and a structured silhouette highlight the elegance of elevated craftsmanship.</p>' +
    '</div>' +
    '<p class="footline">Crafted from high-quality cowhide leather, each piece balances supple texture with lasting strength for timeless everyday luxury.</p>' +
  '</section>';
}

// Module F: size guide - the five bags are one strip image, the
// heading and every size label are real text. Each label sits at the
// exact center of its bag (the left percentages were measured from
// the photo).
function moduleF() {
  return '<section style="background:#f7efed">' +
    '<span class="module-tag">Module F</span>' +
    '<h2>Size Guide</h2>' +
    '<p class="lede">One silhouette, five sizes. Choose the perfect proportion to complement your day, from essentials to everything.</p>' +
    '<div class="banner size-strip" data-img-slot="F-sizes" style="margin-top:26px">' +
      '<img src="' + IMAGES.F + '" alt="The five sizes of the handbag side by side">' +
      '<p class="size-label" style="left:14.05%">Nano<span class="dim">13.5 \u00d7 9.0 \u00d7 5.5 cm</span></p>' +
      '<p class="size-label" style="left:31.61%">Small<span class="dim">22.0 \u00d7 13.0 \u00d7 8.0 cm</span></p>' +
      '<p class="size-label" style="left:48.34%">Mini<span class="dim">20.0 \u00d7 13.5 \u00d7 8.0 cm</span></p>' +
      '<p class="size-label" style="left:65.95%">Medium<span class="dim">26.0 \u00d7 16.0 \u00d7 9.5 cm</span></p>' +
      '<p class="size-label" style="left:85.44%">Large<span class="dim">31.0 \u00d7 20.0 \u00d7 11.0 cm</span></p>' +
    '</div>' +
  '</section>';
}

// Module H = the final product page.
// This is the SAME in all three conditions on purpose.
// The name, price and description match the product page mockup
// provided by the research team.
function moduleH() {
  return '<section>' +
    '<span class="module-tag">Module H</span>' +
    '<div class="product">' +
      '<div data-img-slot="H-product">' +
        '<img src="' + IMAGES.H + '" alt="Model holding the Structured Top-Handle Bag">' +
      '</div>' +
      '<div>' +
        '<p class="eyebrow" style="text-align:left">The Élan Collection</p>' +
        '<h1>Structured Top-Handle Bag</h1>' +
        '<div class="price">$2,350.00</div>' +
        '<p class="desc">A refined silhouette with architectural lines and a polished gold-tone clasp. Crafted from premium grained leather, designed for timeless elegance.</p>' +
        '<dl class="specs">' +
          '<div><dt>Size</dt><dd>Medium — 26.0 × 16.0 × 9.5 cm</dd></div>' +
          '<div><dt>Material</dt><dd>Premium grained cowhide leather</dd></div>' +
          '<div><dt>Color</dt><dd>Black · gold-tone hardware</dd></div>' +
        '</dl>' +
        '<button class="cta" id="addToBag">Add to Bag</button>' +
      '</div>' +
    '</div>' +
  '</section>';
}

// a lookup so we can find a module function by its letter
var MODULES = { A: moduleA, B: moduleB, C: moduleC, D: moduleD,
                E: moduleE, F: moduleF, G: moduleG };

/* ==================================================================
   PART 3: THE THREE CONDITIONS
   Each condition is a list of stages. A stage says:
   - which modules to show
   - how many milliseconds to wait before the button appears
   - what the button says
   The last stage's button leads to the product page, so the total
   click counts are exactly 1 / 4 / 7.
   Button labels follow the brief: "View Product" in the low condition,
   "Continue Exploring" in the moderate and high conditions.
   ================================================================== */

var CONDITIONS = {

  // one long page, one click after 7 seconds
  low: [
    { modules: ['A','B','C','D','E','F','G'], wait: 7000, label: 'View Product' }
  ],

  // 4 stages, waits of 1s / 2s / 2s / 2s
  moderate: [
    { modules: ['A','B'], wait: 1000, label: 'Continue Exploring' },
    { modules: ['C'],     wait: 2000, label: 'Continue Exploring' },
    { modules: ['D','E'], wait: 2000, label: 'Continue Exploring' },
    { modules: ['F','G'], wait: 2000, label: 'Continue Exploring' }
  ],

  // 7 stages, one module each, 1 second wait every time
  high: [
    { modules: ['A'], wait: 1000, label: 'Continue Exploring' },
    { modules: ['B'], wait: 1000, label: 'Continue Exploring' },
    { modules: ['C'], wait: 1000, label: 'Continue Exploring' },
    { modules: ['D'], wait: 1000, label: 'Continue Exploring' },
    { modules: ['E'], wait: 1000, label: 'Continue Exploring' },
    { modules: ['F'], wait: 1000, label: 'Continue Exploring' },
    { modules: ['G'], wait: 1000, label: 'Continue Exploring' }
  ]
};

/* ==================================================================
   PART 4: RECORDING THE DATA
   ================================================================== */

// everything we record about this participant goes in this object
var studyData = {
  participantId: null,        // from the &pid= part of the URL, if given
  condition: null,            // "low", "moderate" or "high"
  startedAt: null,            // when the study started (readable date)
  clicks: [],                 // every button click: what + when
  stageTimes: [],             // how long each stage was viewed
  reachedProductPage: false,
  addedToBag: false,
  totalBrowsingTimeMs: null   // filled in at the very end
};

var startTime = null;   // the exact millisecond the study started
var stageStartTime = null;   // when the current stage began

// remember one button click, with the time since the study started
function recordClick(whatWasClicked) {
  studyData.clicks.push({
    label: whatWasClicked,
    msSinceStart: Date.now() - startTime
  });
}

// lets you type getStudyData() in the browser console to see the data
window.getStudyData = function () { return studyData; };

/* ==================================================================
   PART 5: RUNNING THE STUDY
   ================================================================== */

var app = document.getElementById('app');
var currentCondition = null;
var isPreview = false;   // true only when the condition was picked on the setup screen

// Shows stage number "i" (starting from 0) of the current condition.
function showStage(i) {
  var stages = CONDITIONS[currentCondition];
  var stage = stages[i];
  var isLastStage = (i === stages.length - 1);

  stageStartTime = Date.now();

  // build the HTML: all of this stage's modules, then the button
  var html = '';
  for (var k = 0; k < stage.modules.length; k++) {
    var letter = stage.modules[k];
    html += MODULES[letter]();
  }
  html += '<div class="button-area">' +
            '<button class="cta hidden-btn" id="stageBtn">' + stage.label + '</button>' +
          '</div>';
  app.innerHTML = html;
  window.scrollTo(0, 0);   // start each stage at the top of the page

  var button = document.getElementById('stageBtn');

  // the button only becomes visible after the required viewing time
  setTimeout(function () {
    button.classList.remove('hidden-btn');
  }, stage.wait);

  button.onclick = function () {
    // extra safety: ignore clicks while the button is still hidden
    if (button.classList.contains('hidden-btn')) return;

    recordClick(stage.label + ' (stage ' + (i + 1) + ' of ' + stages.length + ')');
    studyData.stageTimes.push({
      stage: i + 1,
      modules: stage.modules.join('+'),
      msOnStage: Date.now() - stageStartTime
    });

    if (isLastStage) {
      showProductPage();
    } else {
      showStage(i + 1);
    }
  };
}

// The final product page (module H), same for everyone.
function showProductPage() {
  studyData.reachedProductPage = true;
  app.innerHTML = moduleH();
  window.scrollTo(0, 0);

  document.getElementById('addToBag').onclick = function () {
    recordClick('Add to Bag');
    studyData.addedToBag = true;
    studyData.totalBrowsingTimeMs = Date.now() - startTime;

    // send the data to the survey platform, if this page is inside an iframe
    try {
      window.parent.postMessage({ type: 'study-data', data: studyData }, '*');
    } catch (e) { /* not embedded - that is fine */ }

    // also print it to the browser console as a backup
    console.log('STUDY DATA', JSON.stringify(studyData));

    // show the thank-you screen.
    // The raw data box and download button are only shown to researchers
    // in preview mode - real participants just see the thank-you message.
    if (isPreview) {
      document.getElementById('dataBox').textContent = JSON.stringify(studyData, null, 2);
    } else {
      document.getElementById('dataBox').classList.add('hidden');
      document.getElementById('downloadBtn').classList.add('hidden');
    }
    document.getElementById('endScreen').classList.remove('hidden');
  };
}

// the "Download data" button on the thank-you screen
document.getElementById('downloadBtn').onclick = function () {
  var file = new Blob([JSON.stringify(studyData, null, 2)], { type: 'application/json' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(file);
  link.download = 'study-' + studyData.condition + '-' + (studyData.participantId || 'anon') + '.json';
  link.click();
  URL.revokeObjectURL(link.href);
};

// starts the study in the given condition
function startStudy(condition) {
  currentCondition = condition;
  studyData.condition = condition;
  startTime = Date.now();
  studyData.startedAt = new Date().toISOString();
  document.getElementById('setupScreen').classList.add('hidden');
  showStage(0);
}

/* ==================================================================
   PART 6: STARTUP
   Read the URL. If it says which condition to use, start right away.
   If not, show the researcher setup screen.
   ================================================================== */

var params = new URLSearchParams(window.location.search);
studyData.participantId = params.get('pid');           // may be null
var conditionFromUrl = (params.get('cond') || '').toLowerCase();

if (CONDITIONS[conditionFromUrl]) {
  // the URL told us the condition (this is the normal case for participants)
  startStudy(conditionFromUrl);
} else {
  // no valid condition in the URL: let the researcher pick one
  var setup = document.getElementById('setupScreen');
  setup.classList.remove('hidden');

  var choiceButtons = setup.querySelectorAll('[data-cond]');
  for (var i = 0; i < choiceButtons.length; i++) {
    choiceButtons[i].onclick = function () {
      var chosen = this.getAttribute('data-cond');
      if (chosen === 'random') {
        var names = ['low', 'moderate', 'high'];
        chosen = names[Math.floor(Math.random() * names.length)];
      }
      isPreview = true;   // researcher preview: the end screen will show the data
      startStudy(chosen);
    };
  }
}
</script>
</body>
</html>
